<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Lean 5</title>

<!-- PWA / install-to-home-screen -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="REP">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app"><div class="loading">Loading…</div></div>

<div class="timer-screen" id="timerScreen">
  <div class="ts-phase" id="tsPhase">Get Ready</div>
  <div class="ts-round" id="tsRound">Round 1 / 10</div>
  <div class="ts-ring-wrap">
    <svg class="ts-ring" viewBox="0 0 240 240">
      <circle class="ts-ring-track" cx="120" cy="120" r="110"/>
      <circle class="ts-ring-fill" id="tsRing" cx="120" cy="120" r="110"/>
    </svg>
    <div class="ts-count" id="tsCount">10</div>
  </div>
  <div class="ts-msg" id="tsMsg"></div>
  <div class="ts-controls">
    <button class="ts-btn ts-btn-main" id="tsPause">Pause</button>
    <button class="ts-btn ts-btn-ghost" id="tsQuit">Quit</button>
  </div>
</div>

<nav class="tabbar" id="tabbar" hidden>
  <button class="tab active" data-tab="today">
    <svg viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm0 10h8v-8H3v8zm10 0h8v-8h-8v8zm0-18v8h8V3h-8z"/></svg>
    <span>Today</span>
  </button>
  <button class="tab" data-tab="food">
    <svg viewBox="0 0 24 24"><path d="M8.1 3v7.5a2.4 2.4 0 0 1-1.6 2.3V21h-2v-8.2A2.4 2.4 0 0 1 2.9 10.5V3h1.5v6.5h.9V3h1.5v6.5h.9V3h1.5zM17 3c-1.9 0-3 2.4-3 6 0 2.8.8 4 1.9 4.4V21h2V3h-.9z"/></svg>
    <span>Food</span>
  </button>
  <button class="tab" data-tab="workout">
    <svg viewBox="0 0 24 24"><path d="M6.5 6.5h2v11h-2zM15.5 6.5h2v11h-2zM3 9h2v6H3zM19 9h2v6h-2zM8.5 11h7v2h-7z"/></svg>
    <span>Workout</span>
  </button>
  <button class="tab" data-tab="run">
    <svg viewBox="0 0 24 24"><path d="M13.5 5.5a2 2 0 1 0-2-2 2 2 0 0 0 2 2zM6 21l2.4-6.2 2.6 2.4V21h2v-5.6l-2.6-2.4.8-3.6c1.4 1.6 3.4 2.6 5.4 2.6v-2c-1.8 0-3.4-1-4.2-2.4l-1-1.6c-.4-.6-1-1-1.8-1-.3 0-.6 0-.8.2L4.6 9.2V13h2v-2.6l1.8-.8L6 21z"/></svg>
    <span>Run</span>
  </button>
  <button class="tab" data-tab="weight">
    <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0-9 9 9 9 0 0 0 9 9 9 9 0 0 0 9-9 9 9 0 0 0-9-9zm0 2a7 7 0 0 1 6.7 5H13V6.3A7 7 0 0 1 12 5zm-1 .2V11H5.3A7 7 0 0 1 11 5.2zM5 13h6v5.8A7 7 0 0 1 5 13zm8 5.8V13h5.8A7 7 0 0 1 13 18.8z"/></svg>
    <span>Weight</span>
  </button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
